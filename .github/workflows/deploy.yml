name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun build app.ts --outdir=.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
      - run: tar czf pinpoint-deploy.tar.gz index.html app.js
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_number }}
          name: v${{ github.run_number }}
          body: |
            Deploy #${{ github.run_number }} — ${{ github.event.head_commit.message }}

            The built page is attached as `pinpoint-deploy.tar.gz`. Extract and serve with any static server.
          makeLatest: true
          artifacts: pinpoint-deploy.tar.gz
