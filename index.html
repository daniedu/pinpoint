<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinpoint</title>
  <meta name="description" content="Pin images with GPS coordinates on a map" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 h-screen flex flex-col">
  <header class="flex items-center justify-between px-6 py-3 bg-white border-b border-gray-200 shadow-sm">
    <h1 class="text-lg font-semibold">📍 Pinpoint</h1>
    <span id="stats" class="text-sm text-gray-500">0 pins · 0 without GPS</span>
  </header>
  <div class="flex flex-1 overflow-hidden">
    <aside class="w-96 flex flex-col border-r border-gray-200 bg-white overflow-y-auto">
      <div id="dropzone" class="m-4 p-6 border-2 border-dashed border-gray-300 rounded-lg text-center cursor-pointer hover:border-blue-400 transition-colors">
        <p class="text-sm font-medium text-gray-600">Drop images here</p>
        <p class="text-xs text-gray-400 mt-1">or click to browse</p>
        <input id="file-input" type="file" accept="image/*" multiple class="hidden" />
      </div>

      <p id="processing" class="hidden mx-4 mb-2 text-sm text-blue-600 font-medium"></p>

      <div class="px-4 pb-2">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Pins</h2>
        <div id="pin-list" class="space-y-1 mb-3"></div>
      </div>

      <div class="px-4 pb-2">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">No GPS — click to place</h2>
        <div id="no-gps-list" class="space-y-1">
          <p class="text-sm text-gray-400 italic">No images without GPS</p>
        </div>
      </div>

      <div class="mt-auto p-4 border-t border-gray-200 space-y-2">
        <button id="export-btn" class="w-full px-4 py-2 text-sm font-medium text-white bg-black rounded-lg hover:bg-gray-800 transition-colors">
          Export GeoJSON
        </button>
        <button id="clear-btn" class="w-full px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
          Clear All
        </button>
      </div>
    </aside>
    <main id="map" class="flex-1"></main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
